<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>定时器的应用之点击按钮左右移动优化版</title>
		<style type="text/css">
			*{
				margin: 0;
				padding: 0;
			}
			#box01{
				width: 100px;
				height: 100px;
				background-color: #bfa;
				position: absolute;
				left: 0;
			}
			#box02{
				height: 500px;
				width: 0;
				border-left: solid 1px #000;
				position: absolute;
				top: 0;
				left: 800px;
				z-index: 1;
			}
			#box03{
				width: 100px;
				height: 100px;
				background-color: yellow;
				position: absolute;
				left: 0;
				top: 200px;
			}
		</style>
		<script type="text/javascript">
			window.onload = function(){
				var btn01 = document.getElementById("btn01");
				var btn02 = document.getElementById("btn02");
				var btn03 = document.getElementById("btn03");
				var box01 = document.getElementById("box01");
				btn01.onclick = function(){
					move(box01,"left",800,20)
				};
				btn02.onclick = function(){
					move(box01,"left",0,10);
				};
				btn03.onclick = function(){
					move(box03,"left",800,10);
				};
				btn04.onclick = function(){
					move(box03,"width",300,10,function(){
						move(box03,"height",200,10,function(){
							move(box03,"top",300,10,function(){
								move(box03,"width",100,10,function(){
									move(box03,"height",100,10);
								});
							});
						});
					});
				};
			};
			//创建一个函数用来控制盒子移动动画
			/*
			 * 参数：
			 *   1.元素名obj
			 *   2.目标位置target
			 *   3.速度speed
			 *   4.属性attr
			 *   5.回调函数callback
			 */
			/* var timer;
			//注意：当timer定义在全局变量中时，两个元素调用时就会造成冲突，所以不能这样定义，应该使用元素.timer来定义 */
			function move(obj, attr, target, speed, callback) {
				clearInterval(obj.timer);
				//自动判断speed正负值，减少用户计算过程。这里获取当前位置
				var current = parseInt(getStyle(obj, attr));
				if (current > target) {
					speed = -speed;
				}
				obj.timer = setInterval(function() {
					var oldValue = parseInt(getStyle(obj, attr));
					var newValue = oldValue + speed;
					//当speed为负值时向左移，界限为小于target；当speed为正值时向右移，界限为大于target
					if ((speed > 0 && newValue > target) || (speed < 0 && newValue < target)) {
						newValue = target;
					}
					obj.style[attr] = newValue + "px";
					if (newValue == target) {
						clearInterval(obj.timer);
						//当结束完此次动画后如果有回调函数就调用回调函数，如果没有则不执行
						callback && callback();
					}
				}, 50);
			}
			//创建一个函数用来获取元素的样式
			function getStyle(obj, name) {
				if (window.getComputedStyle) {
					return getComputedStyle(obj, null)[name];
				} else {
					return obj.currentStyle[name];
				}
			}
		</script>
	</head>
	<body>
		<button type="button" id="btn01">点我绿盒子向右移</button>
		<button type="button" id="btn02">点我绿盒子向左移</button>
		<button type="button" id="btn03">点我黄盒子向右移</button>
		<button type="button" id="btn04">使用回调函数实现随意变化</button>
		<br /><br />
		<div id="box02"></div>
		<div id="box01"></div>
		<div id="box03"></div>
	</body>
</html>
